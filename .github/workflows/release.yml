name: Release

# Publie une Release GitHub (installeur + latest.yml pour l'auto-update)
# à chaque tag de version poussé, ex. : git tag v0.2.0 && git push origin v0.2.0
on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write # nécessaire pour créer la Release
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build & publish (NSIS + auto-update)
        run: npm run release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
