  <text x="732" y="470" font-size="11" letter-spacing="1" fill="#6e8bff">🤖 RÉSUMÉ IA</text>
  <text x="732" y="494" font-size="13" fill="#cfd6e6">Une entreprise française dévoile un processeur ARM</text>
  <text x="732" y="514" font-size="13" fill="#cfd6e6">pour data centers, 40 % plus sobre, aux performances</text>
  <text x="732" y="534" font-size="13" fill="#cfd6e6">comparables aux meilleures puces du marché.</text>

  <text x="716" y="576" font-size="13" fill="#98a1b3">Le constructeur promet une disponibilité au troisième trimestre. Plusieurs</text>
  <text x="716" y="598" font-size="13" fill="#98a1b3">acteurs du cloud ont déjà manifesté leur intérêt pour la technologie, qui</text>
  <text x="716" y="620" font-size="13" fill="#98a1b3">cible une réduction significative de la facture énergétique des serveurs.</text>
  <text x="716" y="642" font-size="13" fill="#98a1b3">Les premiers tests indépendants confirment des gains substantiels.</text>
