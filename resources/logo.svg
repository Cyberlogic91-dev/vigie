<svg width="680" height="200" viewBox="0 0 680 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1c2747"/>
      <stop offset="1" stop-color="#0c1124"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8aa9ff"/>
      <stop offset="1" stop-color="#3f6ae0"/>
    </linearGradient>
    <linearGradient id="sweep" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#5b8cff" stop-opacity="0"/>
      <stop offset="1" stop-color="#6f9bff" stop-opacity="0.85"/>
    </linearGradient>
    <linearGradient id="word" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#e6ecff"/>
      <stop offset="1" stop-color="#8aa9ff"/>
    </linearGradient>
  </defs>

  <!-- marque (icône) -->
  <g transform="translate(16,20) scale(0.3125)">
    <rect width="512" height="512" rx="116" fill="url(#bg)"/>
    <g fill="none" stroke="url(#ring)" stroke-width="11" opacity="0.55">
      <circle cx="256" cy="256" r="172"/>
      <circle cx="256" cy="256" r="118"/>
      <circle cx="256" cy="256" r="64"/>
    </g>
    <g stroke="#3f6ae0" stroke-width="6" opacity="0.30">
      <line x1="256" y1="72" x2="256" y2="440"/>
      <line x1="72" y1="256" x2="440" y2="256"/>
    </g>
    <path d="M256 256 L256 84 A172 172 0 0 1 405 170 Z" fill="url(#sweep)" opacity="0.6"/>
    <line x1="256" y1="256" x2="256" y2="84" stroke="#a8c4ff" stroke-width="9" stroke-linecap="round"/>
    <circle cx="256" cy="256" r="36" fill="url(#ring)"/>
    <circle cx="256" cy="256" r="36" fill="none" stroke="#c9daff" stroke-width="5"/>
    <circle cx="256" cy="256" r="13" fill="#0c1124"/>
    <circle cx="344" cy="186" r="15" fill="#3ddc84"/>
    <circle cx="344" cy="186" r="26" fill="none" stroke="#3ddc84" stroke-width="4" opacity="0.45"/>
  </g>

  <!-- nom + slogan -->
  <text x="210" y="108" font-family="Segoe UI, Arial, sans-serif" font-size="84" font-weight="700"
        fill="url(#word)" letter-spacing="1">Vigie</text>
  <text x="213" y="150" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="500"
        fill="#9aa3b2" letter-spacing="4">VEILLE TECHNOLOGIQUE</text>
</svg>
